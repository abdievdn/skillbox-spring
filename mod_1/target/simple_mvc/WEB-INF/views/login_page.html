<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Book Shelf Login</title>
    <meta charset="UTF-8">
    <style>
        #login_form {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .login_item {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div id="login_form">
    <img class="login_item" th:src="@{/images/book_PNG2107-170x154.png}" alt="books">
    <form method="post" th:action="@{/login/auth}" th:object="${loginForm}">
        <label>
            <input class="login_item" type="text" placeholder="username" th:field="*{username}">
        </label>
        <br>
        <label>
            <input class="login_item" type="password" placeholder="password" th:field="*{password}">
        </label>
        <br>
        <input class="login_item" type="submit" value="login">
        <br>
    </form>
</div>
</body>
</html>
